name: Document sentence and lexeme report

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.md"
      - "**/*.txt"
      - "**/*.rst"
      - "**/*.html"

permissions:
  contents: read

jobs:
  analyze-documents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate sentence diagram and lexeme report
        run: |
          python - <<'PY'
          import re
          from collections import Counter
          from pathlib import Path

          exts = {".md", ".txt", ".rst", ".html"}
          repo = Path(".")
          report = repo / "document_sentence_lexeme_report.md"
          skip = {".git", ".github", "__pycache__", ".pytest_cache", ".venv", "venv", "node_modules"}
          top_lexemes_limit = 25
          max_lexemes_per_sentence = 40

          def is_skipped(path: Path) -> bool:
              return any(part in skip for part in path.parts)

          def sentences(text: str):
              cleaned = re.sub(r"\s+", " ", text).strip()
              if not cleaned:
                  return []
              return [s.strip() for s in re.split(r"(?<=[.!?])\s+", cleaned) if s.strip()]

          def lexemes(text: str):
              return re.findall(r"[A-Za-z0-9]+(?:['’][A-Za-z0-9]+)*", text.lower())

          docs = sorted(
              path for path in repo.rglob("*")
              if path.is_file() and path.suffix.lower() in exts and not is_skipped(path)
          )

          lines = [
              "# Document sentence and lexeme report",
              "",
              f"Documents analyzed: {len(docs)}",
              "Lexeme rule: alphanumeric tokens with optional apostrophe segments (e.g., don't, we'll).",
              "",
          ]

          if not docs:
              lines.append("No matching documents were found.")
          else:
              for doc in docs:
                  raw = doc.read_text(encoding="utf-8", errors="replace")
                  doc_sentences = sentences(raw)
                  doc_lexemes = lexemes(raw)
                  top = Counter(doc_lexemes).most_common(top_lexemes_limit)

                  lines.extend([
                      f"## {doc.as_posix()}",
                      "",
                      f"- Sentence count: {len(doc_sentences)}",
                      f"- Lexeme count: {len(doc_lexemes)}",
                      f"- Unique lexemes: {len(set(doc_lexemes))}",
                      "",
                      "### Sentence diagram",
                  ])

                  if doc_sentences:
                      for idx, sentence in enumerate(doc_sentences, start=1):
                          sentence_lexemes = lexemes(sentence)
                          truncated = len(sentence_lexemes) > max_lexemes_per_sentence
                          chain = " -> ".join(sentence_lexemes[:max_lexemes_per_sentence]) if sentence_lexemes else "(no lexemes)"
                          if truncated:
                              chain = f"{chain} -> ... (truncated)"
                          lines.append(f"{idx}. {chain}")
                  else:
                      lines.append("No sentences detected.")

                  lines.extend(["", "### Top lexemes"])
                  if top:
                      for word, count in top:
                          lines.append(f"- {word}: {count}")
                  else:
                      lines.append("- None")
                  lines.append("")

          report.write_text("\n".join(lines).rstrip() + "\n", encoding="utf-8")
          print(f"Report written to {report}")
          PY

      - name: Publish report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: document-sentence-lexeme-report
          path: document_sentence_lexeme_report.md

      - name: Add report path to run summary
        run: |
          {
            echo "## Document sentence and lexeme report"
            echo ""
            echo "Generated artifact: \`document-sentence-lexeme-report\`"
            echo "File: \`document_sentence_lexeme_report.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
